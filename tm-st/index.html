function randomString(len=1,caps=true){
  len=Math.max(1,len), s='';
  while(len-->0){
    if(caps){
      s+=String.fromCharCode(Math.floor(Math.random()*26)+97);
    }else{
      s+=String.fromCharCode(Math.floor(Math.random()*26)+65);
    }
  }
  return s;
}
