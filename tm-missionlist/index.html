<!DOCTYPE html>
<html>
<head>
<script src="/lib/jquery-1.12.0.min.js"></script>
<script src="/lib/vue.min.js"></script>
<title>mission list</title>
</head>
<body>
<style>
* {
  font-family: Consolas,Verdana,"Microsoft Yahei";
}
.box  {width:100%;height:100%;background:#ccc;display:grid;grid-row-gap: 50px;}
.line {height:100%;background:red;display:inline-grid;}
#works{
  height: 100%;
}
#works td{
  background: #9f9;
  min-width: 8em;
  text-align: center;
}
#works * {
  margin: 0 auto;
  padding: 3px;
  width: 24em;
  overflow-y:visible;
  display: block
}
#works hr {
  border:1px solid #ccc;
  width:24em;
  margin:20% auto;
}
#works .modify {
  -webkit-user-modify: read-write-plaintext-only;
  user-modify: read-write-plaintext-only;
}
#works p {
  min-width: 24em;
  border:inset 2px solid #ccc;
  border-radius:3.33px;
  margin-top: 1px;
  white-space: pre-wrap;
  word-break: break-all;
  background: #eee;
}
#works p:focus {
  background: #fffe;
}
#works p::before {
  content: attr(id);
  background: #ccc;
  color: #666;
  border-radius: 3px;
  transform: rotate(-12deg) translate(-120%,-66%);
  transition: all .5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  position: absolute;
}
#works p:focus::before {
  background: #ccfc;
  transform: rotate(-6deg) translate(-10%,-125%) scale(1.2);
  color:#00fc;
  font-weight: bold;
}
#works p:hover {
  background: #fff;
}
</style>

<div id="works">
  <label><input type="checkbox" v-model="opts.editContentAutoCenter">중심이동</label>
  <hr>
  <p class="source modify" v-for="(e,i) in rows" v-on:focus.prevent="onCenter" v-on:blur.prevent="onText" v-bind:id="`id${i}`" v-on:input="onInput">{{e}}</p>
  <hr>
</div>

<!-- <div id="works">
  <hr>
  <textarea v-for="(row) in rows" type="text"
  contenteditable="plaintext-only" 
  v-bind:value="row" v-bind:id="`i${row}`"
  v-on:focus.prevent="onCenter"></textarea>
  <hr>
</div> -->

<script>
let rows=[];
let methods={
  onCenter:function(e){
    if(v.opts.editContentAutoCenter) e.target.scrollIntoView({
      behavior:`smooth`,
      // behavior:`auto`,
      // block:`center`,
      inline:`center`
      // inline:`nearest`
    });
  },
  onText:function(e){
    // console.log(e.type,e.target, e.target.textContent)
    console.log(e.target.textContent)
    e.target.textContent = e.target.innerText.trim()
  },
  onInput:function(e){
    // console.log(e.target.innerText);
    // console.log(e.target.outerHTML);
  }
};

let v=new Vue({
  el:'#works',
  data:{
    v1:'VALUE1',
    v2:'VALUE2',
    v3:'VALUE3',
    items:[
      [0,'a'],
      [1,'b'],
      // {index:0, item:'a'},
      // {index:1, item:'b'},
    ],
    rows,
    opts:{
      editContentAutoCenter:true
    },
  },
  methods,
});

let i=1;
while(i<100){
  v.rows.push(i + '-'+randomString(10));
  i++;
}


let p=new Proxy(rows, {
  set:function(target,k,v){
    console.log(k,v);
    return target[k]=v;
  },
  get:function(target,k){
    return target[k];
  },
  apply:function(target,thisArg,args){
    console.log( args);
    return 1
  }
});



function randomString(len=1,caps=true){
  len=Math.max(1,len), s='';
  while(len-->0){
    if(caps){
      s+=String.fromCharCode(Math.floor(Math.random()*26)+97);
    }else{
      s+=String.fromCharCode(Math.floor(Math.random()*26)+65);
    }
  }
  return s;
}




</script>

</body>
</html>
