<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

<body>

    <style>
        #app {
            background: yellow;
        }
    </style>

    <style>
        #app {
            height: 100px;
            width: 100px;
        }

        #app:hover {
            background: tomato;
        }

        #app:focus {
            background-color: moccasin;
        }
    </style>

    <div id="app"></div>


    <script>
        let cm = CM('#app');

        cm.width = '300px';
        cm.height = '300px';
        cm.border = '1px solid red';

        console.log(CM.get('#app'));


        CM('#app::before').content = '"BEFORE"';
        CM('#app::before').background = '#000';
        CM('#app::before').background = '#00b';
        CM('#app::before').color = '#fff';
        
        
        console.log(CM.rules);
        // 快捷方式 Array.from(document.getElementById('cssSelectorText').sheet.rules).map(e=>e.cssText);
    </script>

</body>
