<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<svg width="100%" height="100">
		<line x1="10" y1="10" x2="85" y2="10" style="stroke: #006600;"></line>
		<rect x="10" y="20" height="50" width="75" style="stroke: #006600; fill: #006600"></rect>
		<text x="10" y="90" style="stroke: #660000; fill: #660000">Text grouped with shapes</text>
	</svg>

	<svg width="100%" height="100">
		<g transform="rotate(45 40 20)">
			<rect width="80" height="40" style="stroke: #006600; fill: #006600"></rect>
		</g>
	</svg>

	<svg width="100%" height="100">
		<g stroke="#00F" stroke-width="4" fill="#F00" transform="tranlation(40 20)">
			<rect width="80" height="40"></rect>
		</g>
	</svg>

	<svg width="100%" height="100">
		<g transform="scale(1)">
			<line x1=10 y1=10 x2=100 y2=10 style="stroke:#00F;fill:#F00;"></line>
			<line x1=10 y1=20 x2=100 y2=20 style="stroke-width:2;stroke:#00F;fill:#F00;"></line>
			<line x1=10 y1=30 x2=100 y2=30 style="stroke-width:3;stroke:#00F;fill:#F00;"></line>
			<rect x=10 y=40 width=100 height=4 fill="#090"></rect>
		</g>
	</svg>
</body>

</html>
