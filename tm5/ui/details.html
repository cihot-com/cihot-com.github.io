<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Document</title>

<body>
	<style>

		.menuitem label {
			background-color: crimson;
			color: #fff;
			width: 100%;
			user-select: none;
			display: block !important;
		}
		.menuitem input:checked~label {
			background-color: red;
			color: #ff0;
		}
		.menucontent {
			display: none;
		}
		.menuitem input:checked~.menucontent {
			background-color: #ccc;
			display: block;
		}
	</style>
	<div class="menuitem">
		<input id="sh-switch" type="checkbox" hidden>
		<label for="sh-switch">点击我</label>
		<div class="menucontent">
			sadfjasklfklasdkf
			<div>1</div>
			<div>2</div>
			<div>3</div>
			<div>4</div>
		</div>
	</div>

	<details open>
		<summary>点击我</summary>
		<details-menu>
			内容1
			内容2
			内容3
		</details-menu>
	</details>
</body>

</html>
