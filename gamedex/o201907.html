<style type="text/css">	
	
/* reset */
body,div,dl,dt,dd,ul,li,h1,h2,h3,h4,h5,p,input,button,ol,ul{margin:0;padding:0}
html,body{width:100%;height:100%}
body{font-family:'돋움',dotum,tahoma,sans-serif;font-size:12px;color:#434343}
dl,ul,li{list-style:none}
button{overflow:visible;border:0 none;background-color:transparent;cursor:pointer}
button::-moz-focus-inner{padding:0;border:0}
a{color:#8f8f8f;text-decoration:none;font-weight:bold;}
a:focus,a:active,a:hover{color:#8f8f8f;text-decoration:none}
hr{display:none}

/* common */
.blind{overflow:hidden;position:absolute;top:0;left:0;width:1px;height:1px;font-size:0;line-height:100px;white-space:nowrap}
.sp{}

/* style */
#wrap{width:525px} /* 525  750 */
#header{border-top:3px solid #d74742}
#header h1 a{overflow:hidden;display:block;width:124px;height:16px;margin:15px 0 10px;text-indent:-9999px;}
.content h2{overflow:hidden;width:525px;height:112px;margin-bottom:30px;
	background:url(http://img.hanabank.com/ums/email/img/common/secure_mail_info01.jpg);
	no-repeat;}			
.pc{padding-bottom:10px}
.pc p{padding:10px 0 9px 0;border-top:1px solid #bfbfbf}
.btn_more{display:block;width:118px;height:11px;padding:6px 8px 8px;border:1px solid #ddd;letter-spacing:-1px}
.btn_more span{display:inline-block;width:16px;height:11px;margin-left:9px;background-position:0 -70px}
.btn_more.on span{background-position:-40px -70px}

.mobile{margin-top:20px}
.mobile p{padding:7px 0 3px;border-top:1px solid #bfbfbf;line-height:18px}
.mobile strong{padding-left:5px;background-position:-243px -23px;line-height:18px}
.mobile ol{overflow:hidden;margin-top:3px}

.mobile li:first-child{padding-left:0;background:none}
.btn_link{display:block;width:142px;margin:9px 0 20px 0;padding:8px 9px 7px;background-color:#000;color:#fff;letter-spacing:-1px}
.btn_link:hover,.btn_link:active,.btn_link:hover{color:#fff}

.ph{padding-top:20px;margin-bottom:32px;border-top:1px solid #bfbfbf}
.ph h4{overflow:hidden;height:15px;margin-bottom:6px;text-indent:-9999px}
.ph .iph{width:55px;background-position:0 -50px}
.ph .and{width:70px;margin-top:12px;background-position:-60px -50px}
.ph li{line-height:18px}
.ph li p{margin-bottom:2px}
.ph li strong{letter-spacing:0}
.ph li a{display:inline-block;width:230px;height:25px;margin:2px 5px 8px 0;border:1px solid #ddd;text-align:center;line-height:25px}
.btn{letter-spacing:-1px}

#footer{position:relative;padding:12px 0;border-top:3px solid #000}
#footer a{position:absolute;right:0;top:17px;width:109px;height:14px;background-position:-130px -50px}
address{width:370px;font-style:normal;font-size:11px;color:#a3a3a3;line-height:15px}
#footer p{margin-top:10px;color:#cacaca;font-family:verdana,sans-serif;font-size:10px}

/* 차단된 콘텐츠 허용 방법 숨김박스 */
.detail_bx{margin:10px 0 20px 0;padding:18px 19px 19px;border:1px solid #efefef;background-color:#fbfbfb}
.detail_bx h4{padding-bottom:11px;border-bottom:1px solid #dbdcdc;font-size:16px;font-weight:bold;color:#000}
.detail_bx ol{margin-top:31px}
.detail_bx li img{display:block;margin:9px 0 31px 0;letter-spacing:-1px}
.detail_bx li span{display:inline-block;width:17px;height:11px;margin-right:5px;background-position:-228px -70px;vertical-align:top}
.detail_bx li .num2{background-position:-228px -82px}
.detail_bx li .num3{background-position:-228px -94px}
.detail_bx li .num4{background-position:-228px -106px}
.detail_bx li.last img{margin-bottom:0}


/* 보안메일 비밀번호 입력 */
.p_wrap {overflow:hidden;margin:7% 0 0 10%;}
.p_wrap .p_wrap2{overflow:hidden;}
.p_wrap2 .p_header{overflow:hidden;width:460px;height:111px;
background-image: url(http://img.hanabank.com/ums/email/img/common/secure_mail_banner.png);
}
</style>
<style type="text/css">
div.image {
 width:            100px;
 height:           100px;
 background-image: url(http://img.hanabank.com/ums/email/img/common/secure_mail_bg01.gif);
					no-repeat 0 0;}

.p_content{overflow:hidden;width:460px;height:249px;
background-image: url(http://img.hanabank.com/ums/email/img/common/secure_mail_bg01.gif);
					 no-repeat 0 0;}

.p_content h2{margin:27px 0 0 24px;font-size:12px;color:#fff}
.p_content .sec_txt{margin:13px 0 0 25px;font-size:11px;line-height:16px;color:#f0bcba}
.p_content .sec_txt dl{margin-bottom:22px}
.p_content .sec_txt p{margin-bottom:16px}
.p_content .sec_txt dt{float:left;width:78px}
.p_content .sec_ipt{margin:0 0 5px 25px}

.p_content .sec_ipt .ipt{float:left;width:339px;height:37px;
background:#fff url(http://img.hanabank.com/ums/email/img/common/secure_mail_lock.png) no-repeat 11px 8px; }
.p_content .sec_ipt .ipt input{width:290px;height:21px;margin:10px 0 0 40px;border:none; border:0; border-color:trasparent; font-size:12px;line-height:16px;color:#a3a3a3;*margin-left:20px;}
.p_content .sec_ipt .btn_ok{width:70px;height:37px;margin-left:3px;background:#000;font-size:12px;font-weight:bold;line-height:38px;color:#fff;text-align:center}

/* PassWord Input Contents */
.pwd1 {display:none}

/* ID && PassWord Input Contents */
.pwd2 {display:none}
.pwd2 .sec_ipt{margin-top:-10px}
.pwd2 .sec_ipt .ipt{background-image:none; float:left;width:339px;height:37px; margin-top:5px;}
.pwd2 .sec_ipt .ipt input{width:310px;height:21px;margin:10px 0 0 40px;border:none;font-size:12px;line-height:16px;color:#a3a3a3;margin-left:15px;}
.pwd2 .btn_ok {width:70px;height:80px;margin:5px 0 0 3px;background:#000;font-size:12px;font-weight:bold;line-height:38px;color:#fff;text-align:center}

.input:focus::-webkit-input-placeholder  {color:transparent;}
.input:focus::-moz-placeholder   {color:transparent;}
.input:-moz-placeholder   {color:transparent;}
