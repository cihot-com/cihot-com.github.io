<script>
let useDebug=true;
let o={name:'object'};
let h={
	get:function(tar,k,p){
		// this 就是h。这个。
		let v=tar[k];
		let vType=typeof v;
		if(useDebug){
			console.group('读');
			// console.log('对象',tar);
			console.log('键',k);
			console.log('值',v);
			console.log('类型',vType);
			console.log(Object.getOwnPropertyDescriptor(tar,k));
			console.groupEnd('读');
		}
		return vType==='function' ? v.bind(tar): v;
	},
	set:function(tar,k,v,p){
		if(useDebug){
			let desc=Object.getOwnPropertyDescriptor(tar,k);
			let writable=!(desc.writable||desc.get);
			console.group('写');
			console.log('对象',tar);
			console.log('键',k);
			console.log('旧值',tar[k]);
			console.log('新值',v);
			console.log(desc);
			if(writable) throw new Error('该键为只读属性');
			console.groupEnd('写');
		}
		tar[k]=v;
	},
	construct:function(tar,args,p){
		let obj=new tar(...args);
		if(useDebug){
			console.group('新建实例');
			// console.log('自己',tar);
			console.log('参数:',...args);
			console.log('结果:',obj);
			console.groupEnd('新建实例');
		}
		return obj;
	},
	apply:function(tar,thisArg,args){
		let result=tar.apply(thisArg,args);
		if(useDebug){
			console.group('调用函数apply');
			console.log('自己',thisArg);
			console.log('参数:',...args);
			console.log('结果',result);
			console.groupEnd('调用函数apply');
		}
		return result;
	},
	call:function(tar,thisArg,args){
		console.log('**call')
	}
};
let p=new Proxy(o,h);


function C(name='object C'){
	if(!(this instanceof C)) return new C(name);
	this.name=name;
	return this;
}
let c=new Proxy(C,h);
