<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Hello</title>
</head>

<body>
</body>
<script>
	let { log } = console
	function insert(tagName = 'p', content = '', method = 'Text') {
		let e = document.createElement(tagName)
		method = 'inner' + method.slice(0, 1).toUpperCase() + method.slice(1).toLowerCase()
		e[method] = content
		document.body.insertAdjacentElement('beforeend', e)
	}

	window.onkeydown = log
	insert('onkeydown')

	window.onmousedown = log
	insert('onmousedown')



</script>

</html>
